name: Build iOS

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-simulator:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build app for simulator (unsigned)
        run: |
          xcodebuild -project ios/brrr.xcodeproj -scheme brrr -configuration Debug -sdk iphonesimulator -destination 'platform=iOS Simulator,name=iPhone 16' build CODE_SIGNING_ALLOWED=NO

  build-unsigned-ipa:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Archive app for device (unsigned)
        run: |
          xcodebuild \
            -project ios/brrr.xcodeproj \
            -scheme brrr \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$RUNNER_TEMP/brrr.xcarchive" \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO
      - name: Package unsigned IPA
        run: |
          APP_PATH=$(find "$RUNNER_TEMP/brrr.xcarchive/Products/Applications" -maxdepth 1 -name '*.app' | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "No .app found in archive"
            exit 1
          fi

          mkdir -p "$RUNNER_TEMP/ipa/Payload"
          cp -R "$APP_PATH" "$RUNNER_TEMP/ipa/Payload/"

          cd "$RUNNER_TEMP/ipa"
          zip -r "$RUNNER_TEMP/brrr-unsigned.ipa" Payload
      - uses: actions/upload-artifact@v4
        with:
          name: brrr-unsigned-ipa
          path: ${{ runner.temp }}/brrr-unsigned.ipa
